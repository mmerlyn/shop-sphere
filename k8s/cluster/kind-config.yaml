# kind cluster for ShopSphere — ingress-ready, multi-node so HPA can schedule 2->6 pods
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: shopsphere
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker
