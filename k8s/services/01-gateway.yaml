# API Gateway — single internal entry point. Validates JWT, rate-limits,
# routes to backend services by DNS name. Fronted by the Nginx Ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: shopsphere
  labels: { app: gateway, tier: edge }
spec:
  replicas: 4
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: shopsphere/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          env:
            - { name: PORT, value: "8000" }
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          resources:
            requests: { cpu: "250m", memory: "192Mi" }
            limits: { cpu: "1", memory: "384Mi" }
          startupProbe:
            httpGet: { path: /api/health, port: 8000 }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /api/health, port: 8000 }
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: shopsphere
spec:
  selector: { app: gateway }
  ports: [{ port: 8000, targetPort: 8000 }]
