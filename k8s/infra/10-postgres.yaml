# Database-per-service: one PostgreSQL instance per data-owning service.
# users, catalog, orders, inventory, reviews each get their own DB — no sharing, ever.
# Discovered by other pods via k8s DNS: postgres-<svc>.shopsphere.svc.cluster.local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: shopsphere
data:
  POSTGRES_USER: shopsphere
  POSTGRES_PASSWORD: shopsphere
---
# ---- reviews DB ----
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres-reviews, namespace: shopsphere }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres-reviews } }
  template:
    metadata: { labels: { app: postgres-reviews } }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          envFrom: [{ configMapRef: { name: postgres-init } }]
          env: [{ name: POSTGRES_DB, value: reviews }]
          ports: [{ containerPort: 5432 }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "shopsphere"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: postgres-reviews, namespace: shopsphere }
spec:
  selector: { app: postgres-reviews }
  ports: [{ port: 5432, targetPort: 5432 }]
---
